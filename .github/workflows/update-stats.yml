name: Update repo stats

on:
  schedule:
    - cron: '0 6 */5 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Collect stats
        env:
          GITHUB_TOKEN: ${{ secrets.TRAFFIC_PSYFER }}
        run: python collect_stats.py

      - name: Generate cards
        run: python gen_cards.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/ data/ cards/
          git diff --cached --quiet || git commit -m "stats: $(date -u +%Y-%m-%d)"
          git push
